# Static SPA server for the LogosUI bundle.
#
# nginx gotcha: `add_header` directives are inherited from the parent level
# ONLY when the current level defines no `add_header` directives of its own.
# As soon as one location adds a header, server-level `add_header`s vanish for
# that location. We therefore repeat the security headers in every location
# rather than rely on inheritance.
#
# Content-Security-Policy notes:
#   - Production is same-origin (the API sibling Ingress shares the host with
#     this bundle, see PLAN.md §4.4), so `connect-src 'self'` is sufficient.
#     Dev (`localhost:5173 → localhost:8000`) is unaffected because this
#     config only ships in the production container.
#   - `'unsafe-inline'` on `style-src` is unavoidable today: components like
#     `src/components/Skeleton.tsx` use inline `style={{ width, height }}`
#     for dynamic sizing. PR #24 §G.1 documents the nonce-vs-`unsafe-inline`
#     tradeoff; the pragmatic answer for an admin SPA with no third-party
#     scripts is `'unsafe-inline'` on style and a hard `'self'` on script.
#   - `img-src` allows `data:` (some loading-state placeholders) and `https:`
#     (image URLs from `Image.url` are arbitrary external HTTPS resources).

server {
    listen       8080;
    server_name  _;

    # nginx-unprivileged image runs as UID 101 and cannot bind privileged
    # ports. The Service maps 80 -> targetPort 8080.
    root   /usr/share/nginx/html;
    index  index.html;

    # Hashed asset files emitted by Vite (/assets/<name>-<hash>.<ext>) are
    # content-addressed and safe to cache aggressively. Use `add_header`
    # rather than `expires` so the response carries exactly one Cache-Control
    # line. Asset misses must NOT fall through to the SPA shell — a renamed
    # chunk after a deploy must surface as 404, not as an HTML page that
    # subsequently fails to parse as JavaScript.
    location ^~ /assets/ {
        access_log off;
        add_header Cache-Control            "public, max-age=31536000, immutable" always;
        add_header X-Content-Type-Options   "nosniff"                              always;
        add_header X-Frame-Options          "DENY"                                 always;
        add_header Referrer-Policy          "no-referrer"                          always;
        add_header Content-Security-Policy  "default-src 'self'; base-uri 'self'; object-src 'none'; frame-ancestors 'none'; form-action 'self'; img-src 'self' data: https:; connect-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; font-src 'self' data:;" always;
        try_files $uri =404;
    }

    # Optional Vite-emitted static files at the root (favicon, robots, etc.).
    # Short cache; never `immutable` because filenames are not hashed.
    location = /favicon.ico {
        access_log off;
        add_header Cache-Control            "public, max-age=3600" always;
        add_header X-Content-Type-Options   "nosniff"              always;
        add_header X-Frame-Options          "DENY"                 always;
        add_header Referrer-Policy          "no-referrer"          always;
        add_header Content-Security-Policy  "default-src 'self'; base-uri 'self'; object-src 'none'; frame-ancestors 'none'; form-action 'self'; img-src 'self' data: https:; connect-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; font-src 'self' data:;" always;
        try_files $uri =404;
    }
    location = /robots.txt {
        access_log off;
        add_header Cache-Control            "public, max-age=3600" always;
        add_header X-Content-Type-Options   "nosniff"              always;
        add_header X-Frame-Options          "DENY"                 always;
        add_header Referrer-Policy          "no-referrer"          always;
        add_header Content-Security-Policy  "default-src 'self'; base-uri 'self'; object-src 'none'; frame-ancestors 'none'; form-action 'self'; img-src 'self' data: https:; connect-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; font-src 'self' data:;" always;
        try_files $uri =404;
    }

    # Client-side routing fallback. Every unknown path serves index.html so
    # deep links like /quotes/<id> resolve in the browser. The shell itself
    # MUST be `Cache-Control: no-store`; otherwise users land on a stale
    # index.html that references chunk hashes that no longer exist after a
    # deploy (LogosUI/AGENTS.md: "avoid serving stale app shells that
    # reference removed chunks after deploys").
    location / {
        try_files $uri /index.html;
        add_header Cache-Control            "no-store"     always;
        add_header X-Content-Type-Options   "nosniff"      always;
        add_header X-Frame-Options          "DENY"         always;
        add_header Referrer-Policy          "no-referrer"  always;
        add_header Content-Security-Policy  "default-src 'self'; base-uri 'self'; object-src 'none'; frame-ancestors 'none'; form-action 'self'; img-src 'self' data: https:; connect-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; font-src 'self' data:;" always;
    }
}
