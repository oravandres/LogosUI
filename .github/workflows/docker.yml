name: docker

on:
  push:
    branches: [main]

permissions:
  contents: read
  packages: write

jobs:
  push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          # Mirrors the Logos pattern: ghcr.io/<owner>/<repo-namespace>/<image>.
          images: ghcr.io/${{ github.repository_owner }}/logosui/logos-ui
          tags: |
            type=sha,prefix=,format=short

      # Multi-arch is mandatory: the MiMi cluster mixes amd64 nodes with
      # Raspberry Pi arm64 nodes. A single-platform tag would fail rollouts on
      # arm64 with `no match for platform in manifest` (see the workspace rule
      # 12-pr-review-lessons).
      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          # Bake the cluster API base URL into the bundle so the production
          # image is same-origin with the API behind the shared ingress.
          build-args: |
            VITE_LOGOS_API_BASE_URL=https://logos.mimi.local
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
